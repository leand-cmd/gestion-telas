server {
    listen ${PORT};

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Solo se usa si el frontend se compilo sin VITE_API_URL (docker-compose local).
    # En Railway, VITE_API_URL se define como build-arg y el frontend llama
    # directamente a la URL publica del backend, sin pasar por este proxy.
    location /api {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
